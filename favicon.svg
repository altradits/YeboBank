<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <title>YeboBank</title>
  <defs>
    <!-- Deep navy background -->
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080D1E"/>
      <stop offset="1" stop-color="#111828"/>
    </linearGradient>
    <!-- Gold: bright crown at peak → brand gold → deep amber -->
    <linearGradient id="g" x1="20" y1="11" x2="20" y2="31" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0CC58"/>
      <stop offset="0.58" stop-color="#C49020"/>
      <stop offset="1" stop-color="#8A5E08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>

  <!-- Upward chevron -->
  <path
    d="M8 31L20 11L32 31"
    stroke="url(#g)"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Peak cap — brightest gold, ensures apex reads at 16×16 -->
  <circle cx="20" cy="11" r="3" fill="#F0CC58"/>
</svg>
