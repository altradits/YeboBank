# Builds the Next.js frontend as a static export and deploys it to GitHub Pages
# at https://altradits.github.io/YeboBank
#
# NOTE: the claude/* branch trigger is temporary so the revamp deploys before it
# merges — drop it (keep only main) once the branch lands.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/attached-on-repo-qk5gca
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
