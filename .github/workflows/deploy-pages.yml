# Builds the Next.js frontend as a static export and publishes it to the
# gh-pages branch, which GitHub Pages serves at
# https://altradits.github.io/YeboBank
# (first push to gh-pages enables Pages automatically — no settings change needed)
#
# NOTE: the claude/* branch trigger is temporary so the revamp deploys before it
# merges — drop it (keep only main) once the branch lands.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/attached-on-repo-qk5gca
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
