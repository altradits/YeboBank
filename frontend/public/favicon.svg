<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050D08"/>
      <stop offset="1" stop-color="#0F2618"/>
    </linearGradient>
    <linearGradient id="b" x1="8" y1="8" x2="31" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0BC48"/>
      <stop offset="1" stop-color="#9C6C14"/>
    </linearGradient>
    <radialGradient id="c" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(31 7) scale(20)">
      <stop stop-color="#C9A84C" stop-opacity=".22"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- dark forest background -->
  <rect width="40" height="40" rx="9" fill="url(#a)"/>
  <!-- ambient gold glow top-right -->
  <rect width="40" height="40" rx="9" fill="url(#c)"/>
  <!-- Y — left arm -->
  <path d="M8 7.5L20 19" stroke="url(#b)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Y — right arm -->
  <path d="M32 7.5L20 19" stroke="url(#b)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Y — stem -->
  <path d="M20 19L20 32.5" stroke="url(#b)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- junction node: lime ring + centre dot -->
  <circle cx="20" cy="19" r="4" fill="url(#a)" stroke="#96C244" stroke-width="2"/>
  <circle cx="20" cy="19" r="1.2" fill="#96C244"/>
</svg>
